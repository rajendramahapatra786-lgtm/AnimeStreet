{% extends 'shop/base.html' %}

{% block content %}

<div style="display:flex;justify-content:center;align-items:center;height:80vh;flex-direction:column;">
    
    <div class="spinner"></div>
    <h2 style="margin-top:20px;">Processing your order...</h2>

</div>

<style>
.spinner {
    border: 6px solid #eee;
    border-top: 6px solid #ff6b6b;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>

<script>
async function placeOrder() {
    try {
        const response = await fetch('/api/place-order/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            }
        });

        const data = await response.json();

        if (data.success) {
            // ✅ go to payment page
            window.location.href = `/payment/${data.order_id}/`;
        } else {
            alert("Order failed");
        }

    } catch (error) {
        console.error("ERROR:", error);
        alert("Something went wrong");
    }
}

// 🔥 Run API
placeOrder();

// 🔥 FORCE redirect after 5 sec (fallback)
setTimeout(() => {
    window.location.href = "/profile/"; // or show error page
}, 5000);
</script>

{% endblock %}
